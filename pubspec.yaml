name: gauge_kit
description: >-
  Open-source Flutter gauges: radial, linear, segmented, arc, thermometer.
  Three built-in design styles (Material 3, Cupertino, Executive), pluggable
  style architecture, MIT license. No vendor lock-in. Zero external dependencies.
version: 0.1.0
homepage: https://github.com/sayed3li97/flutter_gauge
repository: https://github.com/sayed3li97/flutter_gauge
issue_tracker: https://github.com/sayed3li97/flutter_gauge/issues
topics: [gauge, dashboard, visualization, material3, chart]

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
