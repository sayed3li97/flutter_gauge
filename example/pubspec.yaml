name: gauge_kit_example
description: Example app for gauge_kit.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  gauge_kit:
    path: ../

flutter:
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
